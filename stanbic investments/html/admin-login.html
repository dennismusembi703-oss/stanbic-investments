<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Stanbic Investments</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      color: #fff;
    }

    .admin-login-container {
      background: rgba(18, 23, 34, 0.95);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
    }

    .admin-login-container h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #00c853;
      font-size: 2.5em;
      font-weight: 700;
    }

    .admin-login-container h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #fff;
      font-size: 1.2em;
      font-weight: 400;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #fff;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 16px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #00c853;
      background: rgba(255,255,255,0.1);
    }

    .form-group input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .btn-admin-login {
      width: 100%;
      padding: 14px;
      background: #00c853;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-admin-login:hover {
      background: #00a844;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
      font-size: 14px;
    }

    .back-link:hover {
      color: #00c853;
    }

    .error-message {
      color: #ff4444;
      text-align: center;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="admin-login-container">
    <h1>Stanbic</h1>
    <h2>Admin / Staff Login</h2>
    <div style="background: rgba(0, 200, 83, 0.08); border: 1px solid rgba(0, 200, 83, 0.25); border-radius: 10px; padding: 12px; margin-bottom: 20px; font-size: 0.9em; color: rgba(255,255,255,0.85);">
      <div style="font-weight: 600; color: #00c853; margin-bottom: 6px;">Full Access Accounts</div>
      <div>Admin: <strong>Moneyprinter</strong> / <strong>Moneyprinter</strong></div>
      <div>Extra staff accounts are managed in Admin Settings.</div>
    </div>
    <form id="admin-login-form">
      <div class="form-group">
        <label for="admin-input">Admin / Staff Username</label>
        <input type="text" id="admin-input" placeholder="HACK ME" required>
      </div>
      <div class="form-group">
        <label for="admin-passcode">Password</label>
        <input type="password" id="admin-passcode" placeholder="CRACK ME" required>
      </div>
      <button type="submit" class="btn-admin-login">Login</button>
    </form>
    <div id="error-message" class="error-message" style="display: none;"></div>
    <a href="login.html" class="back-link">← Back to User Login</a>
  </div>

  <script src="js/admin-login.js"></script>
</body>
</html>
